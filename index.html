<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBusiness Online Shop</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }

header {
    background: linear-gradient(45deg,#0d6efd,#00c6ff);
    color:white;
    text-align:center;
    padding:20px;
}

nav {
    background:#111;
    text-align:center;
    padding:10px;
}
nav a {
    color:white;
    margin:10px;
    text-decoration:none;
}

.hero {
    text-align:center;
    padding:40px;
    background:#fff;
}

.products {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.product {
    background:white;
    width:230px;
    margin:10px;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}
.product:hover { transform:scale(1.05); }

.product img {
    width:100%;
    border-radius:10px;
}

button {
    background:#28a745;
    color:white;
    padding:10px;
    border:none;
    margin-top:10px;
    cursor:pointer;
    border-radius:5px;
}

.cart-summary {
    background:#fff;
    padding:15px;
    margin:20px auto;
    width:90%;
    max-width:400px;
    border-radius:10px;
    display:none;
}

.payment {
    margin-top:10px;
}

.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    text-decoration:none;
}

footer {
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
<h1>MBusiness Online Shop</h1>
<p>Best Deals Everyday</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

<div class="hero">
<h2>স্বাগতম MBusiness এ</h2>
<p>সেরা পণ্য, সেরা দাম</p>
</div>

<div class="products">

<div class="product" data-name="House Offer" data-price="1500">
<img src="https://via.placeholder.com/200">
<h3>House Offer</h3>
<p>৳1500</p>
<button onclick="addToCart(this)">Add to Cart</button>
</div>

<div class="product" data-name="Family Bag" data-price="1200">
<img src="https://via.placeholder.com/200">
<h3>Family Bag</h3>
<p>৳1200</p>
<button onclick="addToCart(this)">Add to Cart</button>
</div>

<div class="product" data-name="Gift Pack" data-price="1000">
<img src="https://via.placeholder.com/200">
<h3>Gift Pack</h3>
<p>৳1000</p>
<button onclick="addToCart(this)">Add to Cart</button>
</div>

<div class="product" data-name="Regular Pack" data-price="500">
<img src="https://via.placeholder.com/200">
<h3>Regular Pack</h3>
<p>৳500</p>
<button onclick="addToCart(this)">Add to Cart</button>
</div>

</div>

<div class="cart-summary" id="cartSummary">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>

<p><strong>Total: ৳<span id="cartTotal">0</span></strong></p>

<div class="payment">
<h4>Payment Method:</h4>
<select id="paymentMethod">
<option>bKash</option>
<option>Nagad</option>
<option>Rocket</option>
</select>
</div>

<button onclick="checkout()">Order Now</button>
</div>

<a class="whatsapp" href="https://wa.me/8801618599077">💬</a>

<footer>
<p>© 2026 MBusiness</p>
</footer>

<script>
let cart = [];

function addToCart(btn){
    let p = btn.parentElement;
    let name = p.dataset.name;
    let price = parseInt(p.dataset.price);

    cart.push({name, price});
    updateCart();
}

function updateCart(){
    let div = document.getElementById("cartItems");
    div.innerHTML="";
    let total=0;

    cart.forEach((item,i)=>{
        div.innerHTML += `
        <p>${item.name} - ৳${item.price}
        <button onclick="removeItem(${i})">❌</button></p>`;
        total += item.price;
    });

    document.getElementById("cartTotal").innerText = total;
    document.getElementById("cartSummary").style.display =
        cart.length>0 ? "block":"none";
}

function removeItem(i){
    cart.splice(i,1);
    updateCart();
}

function checkout(){
    let method = document.getElementById("paymentMethod").value;

    let msg = "🛒 Order Details:\n";
    let total=0;

    cart.forEach(item=>{
        msg += `${item.name} - ৳${item.price}\n`;
        total += item.price;
    });

    msg += `\nTotal: ৳${total}`;
    msg += `\nPayment Method: ${method}`;

    if(method=="bKash"){
        msg += "\nbKash: 01618599077";
    } else if(method=="Nagad"){
        msg += "\nNagad: 01624228476";
    } else {
        msg += "\nRocket: 01624228476";
    }

    window.open("https://wa.me/8801618599077?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
